<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebRTC KV Demo</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    video { width: 300px; height: 200px; border: 1px solid #ccc; margin: 5px; }
    textarea { width: 600px; height: 100px; }
    button { margin: 5px; padding: 5px 10px; }
  </style>
</head>
<body>
  <h1>WebRTC KV Demo</h1>

  <div>
    <video id="local" autoplay playsinline></video>
    <video id="remote" autoplay playsinline></video>
  </div>

  <div>
    <button id="start">Start Camera</button>
    <button id="createOffer">Create Offer</button>
    <button id="acceptOffer">Accept Offer</button>
    <button id="acceptAnswer">Accept Answer</button>
    <button id="refresh">Refresh</button>
  </div>

  <h3>Offer</h3>
  <textarea id="offer" readonly></textarea>

  <h3>Answer</h3>
  <textarea id="answer" readonly></textarea>

  <script>
    const workerUrl = "https://my-web-rtc-lol-12234.cloudflare-8fc.workers.dev"; // replace with your worker
    const roomId = "room1";

    const localVideo = document.getElementById("local");
    const remoteVideo = document.getElementById("remote");
    const offerText = document.getElementById("offer");
    const answerText = document.getElementById("answer");

    let pc = null;
    let localStream = null;
    let remoteStream = null;

    async function startCamera() {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      localVideo.srcObject = localStream;

      pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.ontrack = (event) => {
        if (!remoteStream) {
          remoteStream = new MediaStream();
          remoteVideo.srcObject = remoteStream;
        }
        event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
      };
    }

    async function createOffer() {
      if (!pc) return;
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      offerText.value = JSON.stringify(offer);

      // Post SDP to KV
      await fetch(`${workerUrl}?room=${roomId}&type=offer`, { method: "POST", body: offerText.value });

      // ICE candidate handling
      pc.onicecandidate = async (event) => {
        if (event.candidate) {
          await fetch(`${workerUrl}?room=${roomId}&type=candidates-offer`, {
            method: "POST",
            body: JSON.stringify(event.candidate)
          });
        }
      };
    }

    async function acceptOffer() {
      if (!pc) return;

      const res = await fetch(`${workerUrl}?room=${roomId}&type=offer`);
      const offer = await res.json();
      await pc.setRemoteDescription(offer);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      answerText.value = JSON.stringify(answer);

      await fetch(`${workerUrl}?room=${roomId}&type=answer`, { method: "POST", body: answerText.value });

      // ICE candidate handling
      pc.onicecandidate = async (event) => {
        if (event.candidate) {
          await fetch(`${workerUrl}?room=${roomId}&type=candidates-answer`, {
            method: "POST",
            body: JSON.stringify(event.candidate)
          });
        }
      };
    }

    async function acceptAnswer() {
      if (!pc) return;

      const res = await fetch(`${workerUrl}?room=${roomId}&type=answer`);
      const answer = await res.json();
      if (answer) await pc.setRemoteDescription(answer);
      answerText.value = JSON.stringify(answer);
    }

    // Refresh button fetches ICE candidates from KV
    async function refresh() {
      try {
        // ICE candidates from offerer
        const resOfferCand = await fetch(`${workerUrl}?room=${roomId}&type=candidates-offer`);
        const offerCandidates = await resOfferCand.json() || [];
        offerCandidates.forEach(c => pc?.addIceCandidate(new RTCIceCandidate(c)));

        // ICE candidates from answerer
        const resAnswerCand = await fetch(`${workerUrl}?room=${roomId}&type=candidates-answer`);
        const answerCandidates = await resAnswerCand.json() || [];
        answerCandidates.forEach(c => pc?.addIceCandidate(new RTCIceCandidate(c)));

        // Update SDP textareas
        const resOffer = await fetch(`${workerUrl}?room=${roomId}&type=offer`);
        const offer = await resOffer.json();
        if (offer) offerText.value = JSON.stringify(offer);

        const resAnswer = await fetch(`${workerUrl}?room=${roomId}&type=answer`);
        const answer = await resAnswer.json();
        if (answer) answerText.value = JSON.stringify(answer);

      } catch (e) {
        console.log("Error refreshing", e);
      }
    }

    document.getElementById("start").onclick = startCamera;
    document.getElementById("createOffer").onclick = createOffer;
    document.getElementById("acceptOffer").onclick = acceptOffer;
    document.getElementById("acceptAnswer").onclick = acceptAnswer;
    document.getElementById("refresh").onclick = refresh;
  </script>
</body>
</html>
